# ops-platform — root docker-compose shortcut (dev convenience)
# Full infra stack: infra/docker/docker-compose.yml
# This file adds the API and web app containers on top of infra services.

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server","--appendonly","yes","--requirepass","${REDIS_PASSWORD}"]
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - '3001:3001'
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://default:${REDIS_PASSWORD}@redis:6379
      AUTH_SECRET: ${AUTH_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      # R146.83 — production mode. Engages the R145 startup gate
      # (CORS_ORIGINS, VAULT_MASTER_KEY, CHANNEL_ENCRYPTION_KEY,
      # AUTH_SECRET all required — boot FATALs if any are missing).
      # Also tightens pino logging + suppresses dev error detail in
      # response bodies. The bind-mounted source-reload flow still
      # works because tsx watches files regardless of NODE_ENV.
      NODE_ENV: ${NODE_ENV:-production}
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api/src:/app/apps/api/src

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      # Host 3000 → Caddy 8080 (Caddy listens on :8080 per apps/web/Caddyfile).
      # The compose previously had '3000:3000' which exposed an unbound port.
      - '3000:8080'
    environment:
      # API_UPSTREAM is what Caddy reverse-proxies /api/* to.
      API_UPSTREAM: api:3001
      # VITE_API_URL is build-time; R146.82 removed the localhost fallback
      # in apps/web/src/api.ts so the SPA uses same-origin and Caddy proxies.
    depends_on:
      - api

volumes:
  postgres_data:
    external: true
    name: novan_novan-pgdata
  redis_data:
    external: true
    name: novan_novan-redis
