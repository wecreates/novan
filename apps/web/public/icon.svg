<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="silver" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#f8f8f8"/>
      <stop offset="35%"  stop-color="#dcdcdc"/>
      <stop offset="55%"  stop-color="#9a9a9a"/>
      <stop offset="80%"  stop-color="#e2e2e2"/>
      <stop offset="100%" stop-color="#bbbbbb"/>
    </linearGradient>
    <linearGradient id="silverDark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#8a8a8a"/>
      <stop offset="100%" stop-color="#555555"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#5a5a5a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
  </defs>
  <!-- Rounded black tile with subtle metallic border -->
  <rect x="14" y="14" width="484" height="484" rx="100" ry="100"
        fill="#000" stroke="url(#edge)" stroke-width="4"/>
  <!-- Stylised metallic N: left vertical, diagonal facet, right vertical -->
  <g>
    <polygon fill="url(#silver)"     points="138,104 198,104 198,408 138,408"/>
    <polygon fill="url(#silverDark)" points="198,104 258,104 374,408 314,408"/>
    <polygon fill="url(#silver)"     points="314,104 374,104 374,408 314,408"/>
  </g>
</svg>
