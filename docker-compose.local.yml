# Novan — run locally in Docker against Neon Postgres + Upstash Redis + Gemini.
# One command:
#   docker compose -f docker-compose.local.yml up --build
#
# Then visit:
#   API:  http://localhost:3001/health
#   Docs: http://localhost:3001/docs
#   Web:  http://localhost:5173  (run `pnpm --filter @ops/web dev` in a second window)

services:
  api:
    build:
      context:    .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV:         production
      PORT:             "3001"
      API_HOST:         0.0.0.0
      RUNTIME_MODE:     cloud-api-only
      LOG_LEVEL:        info
      REPO_ROOT:        /app

      # R146.81 — previously hardcoded Neon + Upstash + AUTH_SECRET +
      # VAULT_MASTER_KEY. Those values were leaked to git history; they
      # must be rotated at Neon + Upstash + via openssl rand. Source from
      # .env going forward, same as docker-compose.production.yml.
      DATABASE_URL:     ${DATABASE_URL}
      REDIS_URL:        ${REDIS_URL}
      AUTH_SECRET:      ${AUTH_SECRET}
      VAULT_MASTER_KEY: ${VAULT_MASTER_KEY}

      # Read from gitignored .env at repo root (Docker Compose auto-loads .env)
      GEMINI_API_KEY:   ${GEMINI_API_KEY:-}
      GROQ_API_KEY:     ${GROQ_API_KEY:-}
      OPENAI_API_KEY:        ${OPENAI_API_KEY:-}
      REPLICATE_API_TOKEN:   ${REPLICATE_API_TOKEN:-}
      STABILITY_API_KEY:     ${STABILITY_API_KEY:-}
      FAL_KEY:               ${FAL_KEY:-}
      SEARCH_API_KEY:        ${SEARCH_API_KEY:-}
      SEARCH_PROVIDER:       ${SEARCH_PROVIDER:-tavily}
      IMAGE_PROVIDER_DEFAULT: ${IMAGE_PROVIDER_DEFAULT:-replicate}
      RESEARCH_ENABLED:      ${RESEARCH_ENABLED:-true}
      IMAGE_GENERATION_ENABLED: ${IMAGE_GENERATION_ENABLED:-true}
      NOTIFY_WEBHOOK_URL:    ${NOTIFY_WEBHOOK_URL:-}
      PUSHOVER_TOKEN:        ${PUSHOVER_TOKEN:-}
      PUSHOVER_USER:         ${PUSHOVER_USER:-}
      SLACK_WEBHOOK_URL:     ${SLACK_WEBHOOK_URL:-}
      DISCORD_WEBHOOK_URL:   ${DISCORD_WEBHOOK_URL:-}

      CORS_ORIGINS:     "http://localhost:5173,http://localhost:3000"
      PROVIDER_ROUTER_ENABLED: "true"
      BUDGET_GUARDS_ENABLED:   "true"
      KILL_SWITCH_ENABLED:     "true"
