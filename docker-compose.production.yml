# Novan — Production stack
# Brings up: api, web (Caddy + static), postgres, redis
# Usage:
#   cp .env.production.example .env.production
#   # fill in real values
#   docker compose -f docker-compose.production.yml --env-file .env.production up -d
#   docker compose -f docker-compose.production.yml logs -f api

services:

  postgres:
    # R145 — pgvector image (not vanilla postgres) because migration 0000
    # uses `vector(768)` type. Operator must `CREATE EXTENSION IF NOT
    # EXISTS vector` once after first start, before the API container
    # runs migrations. See scripts/deploy-cloud.sh.
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    volumes:
      - novan-pgdata:/var/lib/postgresql/data
    healthcheck:
      test:    ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout:  5s
      retries:  5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - novan-redis:/data
    healthcheck:
      test:    ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout:  5s
      retries:  5

  api:
    build:
      context:    .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    environment:
      NODE_ENV:           production
      SSE_MAX_CONCURRENT: ${SSE_MAX_CONCURRENT:-200}
      API_PORT:           "3001"
      API_HOST:           0.0.0.0
      DATABASE_URL:       postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL:          redis://default:${REDIS_PASSWORD}@redis:6379
      AUTH_SECRET:        ${AUTH_SECRET}
      VAULT_MASTER_KEY:   ${VAULT_MASTER_KEY}
      # R145 — production-mode env-validation requires these. Without
      # CHANNEL_ENCRYPTION_KEY the API refuses to boot with a FATAL.
      CHANNEL_ENCRYPTION_KEY: ${CHANNEL_ENCRYPTION_KEY}
      RUNTIME_MODE:           ${RUNTIME_MODE:-cloud-api-only}
      # R146.24 — operator bootstrap secret. When set, enables
      # POST /api/v1/auth/bootstrap to mint a long-lived API token
      # for the operator's PWA. Leave UNSET to keep the endpoint
      # returning 503 (default-deny). Generate via:
      #   openssl rand -base64 32 >> .env line `OPERATOR_BOOTSTRAP_SECRET=...`
      OPERATOR_BOOTSTRAP_SECRET: ${OPERATOR_BOOTSTRAP_SECRET:-}
      # R146.25 — flip to "true" in .env once the PWA has been
      # bootstrapped via /setup (R146.24) so it has a token in
      # localStorage. Without that, this would 401 every chat request.
      # Default off keeps existing deployments unaffected.
      ENFORCE_GLOBAL_AUTH: ${ENFORCE_GLOBAL_AUTH:-false}
      CORS_ORIGINS:       ${CORS_ORIGINS}
      # Provider keys (optional — only set what you have)
      OPENAI_API_KEY:     ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY:  ${ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY:     ${GEMINI_API_KEY:-}
      GROQ_API_KEY:       ${GROQ_API_KEY:-}
      STRIPE_SECRET_KEY:  ${STRIPE_SECRET_KEY:-}
      # Telemetry
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_SERVICE_NAME:           novan-api
      LOG_LEVEL:                   info
      REPO_ROOT:                   /app
    healthcheck:
      # R145 — actual liveness route lives at /api/v1/health (Fastify
      # prefix). Previous /health returned 404 → container marked
      # unhealthy → web's depends_on never satisfied → web never started.
      test:    ["CMD", "wget", "-qO-", "http://127.0.0.1:3001/api/v1/health"]
      interval: 30s
      timeout:  5s
      retries:  3
      start_period: 30s
    ports:
      - "3001:3001"

  web:
    build:
      context:    .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE: ${VITE_API_BASE:-/api}
    restart: unless-stopped
    depends_on:
      api: { condition: service_healthy }
    environment:
      API_UPSTREAM: api:3001
    ports:
      - "${WEB_PORT:-8080}:8080"

volumes:
  novan-pgdata:
  novan-redis:
