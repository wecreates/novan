apiVersion: apps/v1
kind: Deployment
metadata:
  name:      ops-api
  namespace: ops-platform
  labels:
    app:       ops-api
    component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ops-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge:       1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app:       ops-api
        component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path:   "/metrics"
        prometheus.io/port:   "3001"
    spec:
      containers:
        - name:  api
          image: ops-platform/api:latest
          ports:
            - containerPort: 3001
              name:          http
          env:
            - name:  NODE_ENV
              value: production
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ops-secrets
                  key:  database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: ops-secrets
                  key:  redis-url
            - name: AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: ops-secrets
                  key:  auth-secret
          resources:
            requests:
              cpu:    100m
              memory: 256Mi
            limits:
              cpu:    500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds:       5
            failureThreshold:    3
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds:       15
            failureThreshold:    3
          securityContext:
            runAsNonRoot:             true
            runAsUser:                1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem:   true
      topologySpreadConstraints:
        - maxSkew:           1
          topologyKey:       kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: ops-api
---
apiVersion: v1
kind: Service
metadata:
  name:      ops-api
  namespace: ops-platform
spec:
  selector:
    app: ops-api
  ports:
    - port:       3001
      targetPort: 3001
      name:       http
