# Redis configuration for ops-platform
# Persistence: AOF + RDB snapshots

bind 0.0.0.0
protected-mode no
port 6379

# Persistence
save 900 1
save 300 10
save 60 10000
appendonly yes
appendfsync everysec
no-appendfsync-on-rewrite no

# Memory
maxmemory 512mb
maxmemory-policy allkeys-lru

# Logging
loglevel notice
logfile ""

# BullMQ requirements
notify-keyspace-events ""

# Connection limits
maxclients 1000
tcp-keepalive 300
timeout 0
