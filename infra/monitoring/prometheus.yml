global:
  scrape_interval:     15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: ops-api
    static_configs:
      - targets: ['host.docker.internal:3001']
    metrics_path: /metrics

  - job_name: otel-collector
    static_configs:
      - targets: ['otel-collector:8889']

  - job_name: redis
    static_configs:
      - targets: ['redis-exporter:9121']

  - job_name: postgres
    static_configs:
      - targets: ['postgres-exporter:9187']
