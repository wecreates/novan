# fly.web.toml — Novan Web (static SPA + Caddy) on fly.io.
#
# Apply with:  fly deploy -c fly.web.toml --build-arg VITE_API_BASE=https://novan-api.fly.dev/api
#
# Assumes:
#   fly apps create novan-web
#
# The web build is fully static — no secrets needed at runtime. The
# only build-time variable is VITE_API_BASE, which embeds the API URL
# into the bundle. Update the --build-arg if your API name differs.

app            = "novan-web"
primary_region = "sjc"

[build]
  dockerfile = "apps/web/Dockerfile"

[http_service]
  internal_port       = 8080
  force_https         = true
  auto_stop_machines  = "stop"      # static SPA can sleep when idle
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type       = "requests"
    soft_limit = 200
    hard_limit = 400

# Caddy serves a 200 on the root path; that's our liveness check.
[[http_service.checks]]
  grace_period  = "10s"
  interval      = "30s"
  method        = "GET"
  timeout       = "3s"
  path          = "/"

[[vm]]
  size      = "shared-cpu-1x"
  memory    = "256mb"
  cpu_kind  = "shared"
  cpus      = 1
